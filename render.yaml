services:
  - type: web
    name: convert-url-api
    runtime: docker
    # IMPORTANT — Plan capacity vs features:
    #   free      (0.5 GB RAM) → ONLY basic conversions (PDF↔Word, image, Excel). All AI
    #                            features (xoá vật thể LaMa/LDM, stems, Whisper, YOLO,
    #                            rembg) will OOM. Use buildArgs to disable them.
    #   standard  (2 GB RAM)   → rembg + faster-whisper + YOLO work. LaMa marginal.
    #   pro       (4 GB RAM)   → LaMa works smoothly. LDM/Demucs need pro+.
    #   pro plus  (8 GB RAM)   → Everything including LDM/Demucs runs fine.
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    # Free plan (0.5 GB RAM): heavy AI is disabled at build to keep the image small
    # and avoid runtime OOM. Core features still work: YouTube/TikTok MP4/MP3,
    # PDF<->Word (text), image tools, Excel, scan-document, OCR+translate, upscale.
    # To enable AI (rembg/whisper/YOLO/LaMa/demucs), move to Standard+ and flip these to "1".
    dockerBuildArgs:
      INSTALL_TORCH: "0"     # base for demucs/LaMa/YOLO
      INSTALL_DEMUCS: "0"    # stems audio
      INSTALL_INPAINT: "0"   # LaMa/LDM object removal
      INSTALL_YOLO: "0"      # smart object detection
      INSTALL_REMBG: "0"     # AI background removal
      INSTALL_WHISPER: "0"   # local transcript
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
    # Optional persistent disk for /downloads (jobs survive container restart).
    # Render free plan does NOT support disks; uncomment on Standard+:
    # disk:
    #   name: downloads
    #   mountPath: /app/downloads
    #   sizeGB: 5
